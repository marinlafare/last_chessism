services:
  chessism-api:
    build: .
    image: chessism-api:latest
    ports:
      - "8003:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - SUPERADMIN_GATE_CODE=${SUPERADMIN_GATE_CODE}
      - AUTH_COOKIE_NAME=${AUTH_COOKIE_NAME}
      - AUTH_SESSION_TTL_DAYS=${AUTH_SESSION_TTL_DAYS}
      - AUTH_COOKIE_SECURE=${AUTH_COOKIE_SECURE}
      - AUTH_GATE_COOKIE_NAME=${AUTH_GATE_COOKIE_NAME}
      - AUTH_GATE_TTL_MINUTES=${AUTH_GATE_TTL_MINUTES}
      - STOCKFISH_STATUS_URL=${STOCKFISH_STATUS_URL}
    networks:
      - chessism_net
    depends_on:
      db:
        condition: service_healthy
      stockfish-service:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ./api_logs:/app/logs

  chessism-web:
    build: ./chessism_web
    image: chessism-web:latest
    ports:
      - "6789:6789"
    environment:
      - VITE_API_BASE_URL=${VITE_API_BASE_URL}
      - VITE_DEV_PROXY_TARGET=${VITE_DEV_PROXY_TARGET}
    command: sh -lc "npm install --no-fund --no-audit && npm run dev"
    volumes:
      - ./chessism_web:/app
      - chessism_web_node_modules:/app/node_modules
    networks:
      - chessism_net
    depends_on:
      chessism-api:
        condition: service_started

  stockfish-service:
    build: ./stockfish-service
    image: stockfish-service:latest
    environment:
      - STOCKFISH_THREADS=${STOCKFISH_THREADS}
      - STOCKFISH_HASH_MB=${STOCKFISH_HASH_MB}
      - STOCKFISH_ANALYSE_TIMEOUT_SEC=${STOCKFISH_ANALYSE_TIMEOUT_SEC}
      - STOCKFISH_SYZYGY_PATH=${STOCKFISH_SYZYGY_PATH}
      - STOCKFISH_SYZYGY_PROBE_DEPTH=${STOCKFISH_SYZYGY_PROBE_DEPTH}
      - REDIS_HOST=${REDIS_HOST}
    volumes:
      - ./syzygy:/syzygy:ro
    networks:
      - chessism_net

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    command: ["postgres", "-c", "max_wal_size=4GB", "-c", "checkpoint_timeout=15min"]
    ports:
      - "5433:5432"
    volumes:
      - ./db_data:/var/lib/postgresql/data
    networks:
      - chessism_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    networks:
      - chessism_net
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker-analysis:
    build: .
    image: chessism-api:latest
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=analysis_queue
      - ANALYSIS_CONCURRENCY=${ANALYSIS_CONCURRENCY}
    networks:
      - chessism_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      stockfish-service:
        condition: service_started

  worker-games:
    build: .
    image: chessism-api:latest
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=games_queue
    networks:
      - chessism_net
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy

  fen-worker-1:
    build: .
    image: chessism-api:latest
    container_name: fen-worker-1
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=fen_queue
    networks:
      - chessism_net
    volumes:
      - ./illegal_fen.txt:/app/illegal_fen.txt
    depends_on:
      - redis
      - db

  fen-worker-2:
    build: .
    image: chessism-api:latest
    container_name: fen-worker-2
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=fen_queue
    networks:
      - chessism_net
    volumes:
      - ./illegal_fen.txt:/app/illegal_fen.txt
    depends_on:
      - redis
      - db

  fen-worker-3:
    build: .
    image: chessism-api:latest
    container_name: fen-worker-3
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=fen_queue
    networks:
      - chessism_net
    volumes:
      - ./illegal_fen.txt:/app/illegal_fen.txt
    depends_on:
      - redis
      - db

  # --- NEW: THE "BOSS" WORKER ---
  pipeline-worker:
    build: .
    image: chessism-api:latest
    container_name: pipeline-worker
    command: arq worker.WorkerSettings
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_HOST=${REDIS_HOST}
      - QUEUE_NAME=pipeline_queue # <-- Listens to its own queue
    networks:
      - chessism_net
    depends_on:
      - redis
      - db

networks:
  chessism_net:
    driver: bridge

volumes:
  redis_data:
  db_data:
  chessism_web_node_modules:
